<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <aside>
        <h2 class="logo">FocusFlow</h2>
        <nav>
          <ul>
            <li>Dashboard</li>
            <li>Tasks</li>
            <li>Notes</li>
            <li>Calendar</li>
            <li>Weather</li>
            <li>Quotes</li>
            <li>Settings</li>
          </ul>
        </nav>
        <div class="theme-toggle">
          <span>Dark Mode 🌙</span>

          <label class="switch">
            <input type="checkbox" id="themeToggle" />
            <span class="slider"></span>
          </label>
        </div>
      </aside>
      <main>
        <header class="topbar">
          <div class="left-header">
            <button class="menu-btn">☰</button>
            <input type="text" placeholder="Search anything..." />
          </div>

          <div class="right-header">
            <button class="theme-btn">🌙</button>
            <div class="profile">KV</div>
          </div>
        </header>
        <section class="headline">
          <h1>Welcome Back, Ramana</h1>
          <h3>Stay focused and keep going!</h3>
        </section>
        <section class="top-cards">
          <div class="card">Tasks</div>
          <div class="card">
            <h3>Clock</h3>
            <p id="clockTime">00:00:00</p>
            <p id="clockPeriod">AM</p>
            <p id="clockDate"></p>
          </div>
          <div class="card">Weather</div>
          <div class="card">Quote</div>
        </section>

        <section class="bottom-cards">
          <div class="card todo big">
            <h3>My Tasks</h3>

            <div class="todo-input">
              <input
                type="text"
                id="taskInput"
                placeholder="Add a new task..."
              />
              <button id="addTaskBtn">Add</button>
            </div>

            <ul id="taskList"></ul>
          </div>
          <div class="card big">Notes</div>
          <div class="card big">Weather Details</div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
